/* Заголовок */
h1{
  text-align:center;
  margin-top:25px;
  font-size:48px;
  color:#2c5e3f;
  text-shadow:2px 2px 4px white;
}

/* Зона цветов */
.flowers{
  position:absolute;
  bottom:260px; 
  width:100%;
  height:450px;
}

/* Крупные цветы */
.flower{
  position:absolute;
  font-size:120px;
  animation: appear 0.3s ease-out;

  
}

@keyframes appear{
  from{ transform: scale(0); opacity:0;}
  to{ transform: scale(1); opacity:1;}
}

/* Панель */
.controls{
  position:absolute;
  bottom:0;
  width:100%;
  background:rgba(255,255,255,0.9);
  padding:25px 10px 20px 10px;
  text-align:center;
}

/* Кнопки в один ряд */
.buttons{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:nowrap;
}

button{
  padding:20px 25px;
  border:none;
  border-radius:18px;
  font-size:22px;
  cursor:pointer;
  font-weight:bold;
  min-width:280px;
}

.blue{ background:#4FC3F7; }
.yellow{ background:#FFD54F; }
.pink{ background:#F48FB1; }
.reset{ background:#cccccc; margin-top:15px; }

/* Счётчик */
.counter{
  margin-top:15px;
  font-size:28px;
  font-weight:bold;
  color:#333;
}
</style>
</head>

<body>

<div class="container">

<h1>Рефлексия: Здравствуй, Весна!</h1>

<div class="flowers" id="flowerZone"></div>

<div class="controls">

  <div class="buttons">
    <button class="blue" onclick="addFlower('blue')">
      Всё понятно, могу применить
    </button>

    <button class="yellow" onclick="addFlower('yellow')">
      Нужно потренироваться
    </button>

    <button class="pink" onclick="addFlower('pink')">
      Пока трудно
    </button>
  </div>

  <button class="reset" onclick="resetAll()">Сбросить</button>

  <div class="counter">
    Голубых: <span id="c1">0</span> |
    Жёлтых: <span id="c2">0</span> |
    Розовых: <span id="c3">0</span>
  </div>

</div>
</div>

<script>
let countBlue=0;
let countYellow=0;
let countPink=0;

function addFlower(color){
  const zone=document.getElementById("flowerZone");
  const flower=document.createElement("div");
  flower.className="flower";
  flower.innerHTML="❀";

  let left=Math.random()*85;
  let bottom=Math.random()*380;

  flower.style.left=left+"%";
  flower.style.bottom=bottom+"px";

  if(color==="blue"){
    flower.style.color="#00CFFF";
    countBlue++;
    document.getElementById("c1").textContent=countBlue;
  }

  if(color==="yellow"){
    flower.style.color="#FFD54F";
    countYellow++;
    document.getElementById("c2").textContent=countYellow;
  }

  if(color==="pink"){
    flower.style.color="#FF4FA3";
    countPink++;
    document.getElementById("c3").textContent=countPink;
  }

  zone.appendChild(flower);
}

function resetAll(){
  document.getElementById("flowerZone").innerHTML="";
  countBlue=0;
  countYellow=0;
  countPink=0;
  document.getElementById("c1").textContent=0;
  document.getElementById("c2").textContent=0;
  document.getElementById("c3").textContent=0;
}
</script>

</body>
</html>
